naftiko: 1.0.0-alpha2
info:
  label: Mirror GitLab merge requests as Linear issues
  description: When a GitLab merge request is opened or transitions state, create or update the corresponding Linear issue with reviewers, status, and a back-link to the merge request.
  tags:
  - Linear
  - Integration
  - Source control
  - gitlab
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    LINEAR_API_KEY: LINEAR_API_KEY
    GITLAB_API_KEY: GITLAB_API_KEY
capability:
  consumes:
  - type: http
    namespace: linear
    baseUri: https://api.linear.app
    description: Linear API operations consumed by this integration.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: executegraphqlquery
        method: POST
        description: Run a Linear GraphQL mutation to create or update the issue mirrored from the merge request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: gitlab
    baseUri: https://gitlab.com/api/v4
    description: GitLab REST API operations consumed by this integration.
    resources:
    - name: projects-id-merge-requests-merge-request-iid
      path: /projects/{id}/merge_requests/{merge_request_iid}
      operations:
      - name: getmergerequest
        method: GET
        description: 'GitLab REST API: getMergeRequest'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: merge_request_iid
          in: path
          type: string
          description: Path parameter merge_request_iid.
          required: true
    - name: projects-id-merge-requests-merge-request-iid-notes
      path: /projects/{id}/merge_requests/{merge_request_iid}/notes
      operations:
      - name: createmergerequestnote
        method: POST
        description: 'GitLab REST API: createMergeRequestNote'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: merge_request_iid
          in: path
          type: string
          description: Path parameter merge_request_iid.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: linear-gitlab-mcp
    description: MCP adapter for the linear-gitlab integration.
    tools:
    - name: linear_gitlab
      description: Execute the linear gitlab integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: linear-gitlab-rest
    port: 8080
    description: REST adapter for the linear-gitlab integration.
    resources:
    - path: /linear-gitlab
      name: linear-gitlab
      description: REST surface for the linear-gitlab integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the linear-gitlab integration.
        call: linear_gitlab
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.

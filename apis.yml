    type: JSONSchema
  - url: https://raw.githubusercontent.com/api-evangelist/linear/refs/heads/main/json-ld/linear-context.jsonld
    type: JSONLDContext
  - url: graphql/linear-graphql.md
    type: GraphQL
  description: >-
    Linear's public GraphQL API provides full access to create, read, update, and query issues, projects, cycles,
    roadmaps, and teams. It is the same API Linear uses internally for its own applications, supporting pagination,
    filtering, attachments, and file uploads.
- aid: linear:linear-webhooks-api
  name: Linear Webhooks API
  tags:
  - Events
  - Real-Time
  - Webhooks
  image: https://raw.githubusercontent.com/api-evangelist/linear/refs/heads/main/image.png
  humanURL: https://linear.app/developers/webhooks
  baseURL: https://api.linear.app/graphql
  properties:
  - url: https://linear.app/developers/webhooks
    type: Documentation
  - url: https://linear.app/developers/sdk-webhooks
    type: GettingStarted
  - url: https://raw.githubusercontent.com/api-evangelist/linear/refs/heads/main/asyncapi/linear-webhooks-asyncapi.yml
    type: AsyncAPI
  description: >-
    Linear webhooks deliver HTTP push notifications whenever data is created, updated, or removed. Webhooks are
    organization-scoped and can be configured for all public teams or a single team, enabling integrations that
    trigger CI builds, update external systems, or send messages based on issue activity.
